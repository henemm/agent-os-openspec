# OpenSpec Framework Configuration v3.0
# ======================================
# Central configuration for the 8-phase workflow enforcement system.
# v3: Consolidated hooks, isolated workflow state.
#
# Copy this file to your project root as openspec.yaml and customize.

# Project Information
project:
  name: "My Project"
  base_path: "/path/to/project"  # Will be auto-detected if not set

# Workflow Configuration (v3)
workflow:
  # 10 phases including phase6b_adversary
  phases:
    - phase0_idle
    - phase1_context
    - phase2_analyse
    - phase3_spec
    - phase4_approved
    - phase5_tdd_red
    - phase6_implement
    - phase6b_adversary
    - phase7_validate
    - phase8_complete

  # Phases that allow code modification (used by edit_gate.py)
  code_modify_phases:
    - phase6_implement
    - phase6b_adversary
    - phase7_validate
    - phase8_complete

  # Phrases that trigger spec approval (case-insensitive, word-boundary matched)
  approval_phrases:
    - "approved"
    - "freigabe"
    - "spec ok"
    - "lgtm"
    - "looks good"
    - "genehmigt"
    - "abgenommen"
    - "passt"
    - "sieht gut aus"

# Edit Gate — Controls which code files can be edited and when
# Used by edit_gate.py (consolidated PreToolUse Edit|Write hook)
strict_code_gate:
  code_extensions:
    - ".swift"
    - ".kt"
    - ".java"
    - ".py"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".jsx"
    - ".go"
    - ".rs"
    - ".cpp"
    - ".c"
    - ".h"
    - ".hpp"
    - ".rb"
    - ".php"
    - ".cs"
  always_allowed_dirs:
    - "Tests/"
    - "UITests/"
    - "Test/"
    - "test/"
    - "tests/"
    - "__tests__/"
    - "spec/"
    - "docs/"
    - ".claude/commands/"
    - "scripts/"
    - "tools/"
  always_allowed_patterns:
    - "\\.md$"
    - "\\.txt$"
    - "\\.json$"
    - "\\.yaml$"
    - "\\.yml$"
    - "\\.toml$"
    - "\\.gitignore$"
    - "README"
    - "CHANGELOG"
    - "LICENSE"

# Secrets Guard — Prevents accidental exposure of sensitive files
# Used by bash_gate.py
secrets_guard:
  sensitive_patterns:
    - "\\.env"
    - "credentials\\.json"
    - "service[_-]?account.*\\.json"
    - "_key"
    - "_secret"
    - "\\.pem$"
    - "\\.key$"
  always_blocked:  # Even in staging mode
    - "credentials\\.json"
    - "service[_-]?account.*\\.json"
    - "_key"
    - "_secret"
    - "\\.pem$"
    - "\\.key$"

# Credentials Guard — Detects hardcoded secrets in bash commands
# Used by bash_gate.py (step 4b). Empty patterns list = use built-in defaults.
credentials_guard:
  patterns: []

# E2E Scope Detection — Classifies commits by scope for downstream E2E routing
# Used by bash_gate.py (step 5c) — writes e2e_scope to workflow state, never blocks
# Scope values: docs-only | frontend-only | backend | full-stack
e2e_scope:
  docs_patterns:
    - '^docs/'
    - '\.md$'
    - '^\.claude/'
  frontend_patterns:
    - '^(frontend|ui|client)/'
    - '^src/.*\.(svelte|vue|tsx|jsx|css|scss|html)$'
  backend_patterns:
    - '^(src|api|internal|cmd|backend|server)/'

# Pre-commit Gate — Checks before git commit is allowed
# Used by bash_gate.py
pre_commit:
  required_staged_files: []  # Files that MUST be staged (e.g., ["docs/ACTIVE-todos.md"])

# Stop Lock — Pause all operations on user command
# Used by edit_gate.py, bash_gate.py, phase_listener.py
stop_lock:
  stop_keywords:
    - "stop"
    - "stopp"
    - "halt"
  resume_keywords:
    - "resume"
    - "weiter"
    - "continue"
    - "weitermachen"

# Override Token — One-time gate bypass
# Used by edit_gate.py, phase_listener.py
override_token:
  keywords:
    - "override"
    - "ueberschreiben"
    - "ich genehmige"

# TDD Enforcement
tdd:
  max_artifact_age_hours: 24
  artifact_categories:
    default:
      min_artifacts: 1
      types:
        - screenshot
        - email
        - api_response
        - log
        - file
        - test_output
        - ui_test_output
        - video
        - audio
  min_sizes:
    screenshot: 1000
    email: 100
    api_response: 10
    log: 10
    test_output: 10
    video: 10000
    audio: 1000

# Adversary Gate — Validate real test output
# Used by post_bash.py
adversary_gate:
  test_patterns:
    - framework: "pytest"
      pass_pattern: "passed"
      fail_pattern: "FAILED|ERROR"
    - framework: "jest"
      pass_pattern: "Tests:.*passed"
      fail_pattern: "Tests:.*failed"
    - framework: "xcodebuild"
      pass_pattern: "\\*\\* TEST SUCCEEDED \\*\\*"
      fail_pattern: "\\*\\* TEST FAILED \\*\\*"
    - framework: "go_test"
      pass_pattern: "^ok\\s+"
      fail_pattern: "^FAIL\\s+"
    - framework: "cargo_test"
      pass_pattern: "test result: ok"
      fail_pattern: "test result: FAILED"

# Specs Configuration
specs:
  base_path: "docs/specs"
  template_file: "docs/specs/_template.md"
  categories:
    modules:
      pattern: "^class\\s+(\\w+)"
      path: "modules"
    functions:
      pattern: "^def\\s+(\\w+)"
      path: "functions"
    tests:
      pattern: "^def\\s+test_(\\w+)"
      path: "tests"

# Agent Configuration
# Model Strategy: Haiku (mechanical) / Sonnet (creative) / Opus (core, main context)
agents:
  default_model: "sonnet"
  spec_writer:
    model: "sonnet"
    enabled: true
  spec_validator:
    model: "haiku"
    enabled: true
  docs_updater:
    model: "sonnet"
    enabled: true
  bug_intake:
    model: "haiku"
    enabled: true
  bug_investigator:
    model: "sonnet"
    enabled: true
  test_runner:
    model: "haiku"
    enabled: true
  feature_planner:
    model: "sonnet"
    enabled: true
  user_story_planner:
    model: "opus"
    enabled: true
  implementation_validator:
    model: "sonnet"
    enabled: true

# Domain-specific modules (installed via setup.py --module)
modules:
  ios_swiftui:
    enabled: false
  home_assistant:
    enabled: false
